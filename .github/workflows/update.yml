name: Atualizar Abastecimento

on:
  schedule:
    - cron: '*/5 * * * *'  # Roda a cada 5 minutos
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Buscar dados do SharePoint
        run: |
          curl -o dados.json "https://capriccheadm.sharepoint.com/sites/AbastecimentoLanches/Documentos%20Compartilhados/dados.json"
          
      - name: Atualizar index.html
        run: |
          python3 update.py
          
      - name: Commit e Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add index.html
          git commit -m "Atualizar abastecimento" || echo "Sem mudanças"
          git push
